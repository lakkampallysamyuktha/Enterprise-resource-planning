<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found | Stackly</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .page-404 {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            background: #0f172a;
            padding: 20px;
        }
        .error-code {
            font-size: 12rem;
            font-weight: 900;
            background: linear-gradient(90deg, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 40px rgba(59,130,246,0.4));
            line-height: 1;
        }
        .error-message {
            font-size: 2.5rem;
            color: white;
            font-weight: 700;
            margin-bottom: 15px;
        }
        .error-desc {
            color: rgba(255,255,255,0.7);
            max-width: 500px;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }
        .action-buttons {
            display: flex; 
            gap: 1rem; 
            justify-content: center; 
            align-items: center; 
            margin-top: 1rem;
        }
        @media (max-width: 600px) {
            .error-code {
                font-size: 8rem;
            }
            .error-message {
                font-size: 1.8rem;
            }
            .action-buttons {
                flex-direction: column;
                width: 100%;
            }
            .action-buttons .btn {
                width: 100% !important;
                max-width: 250px;
            }
        }
    </style>
</head>
<body>
    


    <main>
        <section class="page-404">
            <div class="error-code">404</div>
            <h1 class="error-message">Lost in the cloud?</h1>
            <p class="error-desc">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
            <div class="action-buttons">
                <button onclick="history.back()" class="btn btn-outline" style="cursor: pointer; font-family: inherit; font-size: 1rem; padding: 0 1.5rem; width: 150px; height: 48px; display: inline-flex; align-items: center; justify-content: center; box-sizing: border-box;"><i class="fa-solid fa-arrow-left mr-2"></i> Go Back</button>
                <a href="index.html" class="btn btn-primary btn-glow" style="text-decoration: none; font-size: 1rem; padding: 0 1.5rem; width: 150px; height: 48px; display: inline-flex; align-items: center; justify-content: center; box-sizing: border-box;"><i class="fa-solid fa-house mr-2"></i> Go Home</a>
            </div>
        </section>
    </main>



</body>
</html>
