<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrations – Stackly ERP</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="app-layout">

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <a href="index.html" class="sidebar-logo">
            <img src="Images/img_03252981.webp" alt="Stackly">
            <span class="role-badge" id="sidebar-role">Admin</span>
        </a>
        <button class="close-sidebar-btn" id="close-btn"><i class="fa-solid fa-xmark"></i></button>

        <nav class="sidebar-nav">
            <span class="nav-section-label">Overview</span>
            <a href="dashboard.html" class="nav-link">
                <i class="fa-solid fa-chart-pie"></i> Dashboard
            </a>
            <a href="finance.html" class="nav-link">
                <i class="fa-solid fa-wallet"></i> Finance
            </a>
            <a href="inventory.html" class="nav-link">
                <i class="fa-solid fa-boxes-stacked"></i> Inventory
            </a>
            <a href="crm.html" class="nav-link">
                <i class="fa-solid fa-users"></i> CRM
            </a>
            <a href="hr-payroll.html" class="nav-link">
                <i class="fa-solid fa-id-card"></i> HR & Payroll
            </a>

            <div class="nav-divider"></div>
            
            <span class="nav-section-label">System</span>
            <a href="users.html" class="nav-link">
                <i class="fa-solid fa-users-gear"></i> User Management
            </a>
            <a href="integrations.html" class="nav-link active">
                <i class="fa-solid fa-plug"></i> Integrations
            </a>
            <a href="settings.html" class="nav-link">
                <i class="fa-solid fa-gear"></i> Settings
            </a>
            <a href="login.html" class="nav-link logout">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Sign Out
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-ava" id="sidebar-ava">JD</div>
            <div class="user-info">
                <div class="uname" id="sidebar-name">John Doe</div>
                <div class="uemail" id="sidebar-email">john@stackly.com</div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-wrap">
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle" id="menu-toggle"><i class="fa-solid fa-bars"></i></button>
                <div class="topbar-title">Integrations</div>
            </div>
            <div class="topbar-right">
                <button class="notif-btn">
                    <i class="fa-regular fa-bell"></i>
                </button>
            </div>
        </header>

        <!-- Page Body -->
        <div class="page-body">
            <div class="sec-head">
                <h2>Connected Apps</h2>
                <button class="btn btn-primary" onclick="window.location.href='404.html'">Browse Marketplace</button>
            </div>

            <div class="dashboard-grid">
                <div class="glass-card p-4">
                    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
                        <i class="fa-brands fa-slack text-blue" style="font-size: 32px;"></i>
                        <div>
                            <h3 style="margin:0;">Slack</h3>
                            <p style="font-size: 0.85rem; color: rgba(255,255,255,0.6);">Send notifications to channels.</p>
                        </div>
                    </div>
                    <button class="btn btn-outline" style="width: 100%; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: white; margin-top: 15px;" onclick="window.location.href='404.html'">Connected</button>
                </div>
                
                <div class="glass-card p-4">
                    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
                        <i class="fa-brands fa-stripe text-blue" style="font-size: 32px;"></i>
                        <div>
                            <h3 style="margin:0;">Stripe</h3>
                            <p style="font-size: 0.85rem; color: rgba(255,255,255,0.6);">Process payments and invoices.</p>
                        </div>
                    </div>
                    <button class="btn btn-primary" style="width: 100%; margin-top: 15px;" onclick="window.location.href='404.html'">Connect</button>
                </div>
                
                <div class="glass-card p-4">
                    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
                        <i class="fa-brands fa-google text-blue" style="font-size: 32px;"></i>
                        <div>
                            <h3 style="margin:0;">Google Workspace</h3>
                            <p style="font-size: 0.85rem; color: rgba(255,255,255,0.6);">Sync calendar and emails.</p>
                        </div>
                    </div>
                    <button class="btn btn-primary" style="width: 100%; margin-top: 15px;" onclick="window.location.href='404.html'">Connect</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const closeBtn = document.getElementById('close-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        function toggleSidebar() { sidebar.classList.toggle('open'); overlay.classList.toggle('open'); }
        menuToggle.addEventListener('click', toggleSidebar);
        closeBtn.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

        document.addEventListener('DOMContentLoaded', () => {
            const email = localStorage.getItem('userEmail');
            const name = localStorage.getItem('userName');
            const role = localStorage.getItem('userRole');
            if (email) document.getElementById('sidebar-email').textContent = email;
            if (name) {
                document.getElementById('sidebar-name').textContent = name;
                document.getElementById('sidebar-ava').textContent = name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
            }
            if (role) document.getElementById('sidebar-role').textContent = role.charAt(0).toUpperCase() + role.slice(1);
        });
    </script>
</body>
</html>
